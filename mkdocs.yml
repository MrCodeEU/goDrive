site_name: goDrive
site_description: Self-hosted file manager for families. Fast, private, and filesystem-native.
site_url: https://mrcodeeu.github.io/goDrive
repo_url: https://github.com/MrCodeEU/goDrive
repo_name: MrCodeEU/goDrive
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Configuration: getting-started/configuration.md
    - Deployment: getting-started/deployment.md
    - Demo Instance: demo-instance.md
  - Features:
    - Overview: features/overview.md
    - Web UI: features/web-ui.md
    - Mobile Apps: features/mobile.md
    - Previews & Thumbnails: features/previews.md
    - Webhooks: features/webhooks.md
    - WebDAV: features/webdav.md
    - CLI: features/cli.md
  - Architecture:
    - Overview: architecture.md
    - API Reference: api-contract.md
    - Security: security-audit.md
  - Development:
    - Contributing: contributing.md
    - Release Process: release-process.md
    - CI & Local Checks: ci-local.md
    - Feature Support: feature-support.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MrCodeEU/goDrive
  generator: false

copyright: Copyright &copy; 2026 MrCodeEU
