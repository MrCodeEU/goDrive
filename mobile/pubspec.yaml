name: godrive
description: goDrive mobile client for iOS and Android.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Auth / persistence
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.2

  # State
  provider: ^6.1.2

  # File / image picking
  file_picker: ^12.0.0-beta.5
  image_picker: ^1.1.2

  # Image display
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0

  # Video playback
  video_player: ^2.9.1
  chewie: ^1.14.1

  # PDF / external viewer
  url_launcher: ^6.3.1

  # Keep screen on during active uploads
  wakelock_plus: ^1.6.1

  # Android share-sheet integration
  receive_sharing_intent: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
