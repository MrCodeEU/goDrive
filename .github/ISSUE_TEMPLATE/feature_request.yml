name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: surfaces
    attributes:
      label: Relevant surfaces
      multiple: true
      options:
        - Web UI
        - Backend/API
        - Android
        - iOS
        - WebDAV
        - CLI
        - Docker/deployment
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or other designs you considered.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, examples, related apps, or deployment constraints.
