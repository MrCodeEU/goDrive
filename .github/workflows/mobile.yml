name: Mobile

# Flutter mobile builds. Android builds run in CI.
# iOS requires macOS runners and Apple signing — see SPEC.md §Mobile Build.
# Enable when the Flutter app exists under mobile/.

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'mobile/**'

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    # Remove the condition below once mobile/ exists.
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze

      - name: Test
        working-directory: mobile
        run: flutter test

      - name: Build APK (debug)
        working-directory: mobile
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: godrive-debug.apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # iOS requires:
  #   runs-on: macos-latest
  #   An Apple Developer account, distribution certificate, and provisioning profile.
  #   Secrets: APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD, APPLE_PROVISIONING_PROFILE_BASE64
  #   fastlane or manual xcodebuild signing setup.
  #
  # For local testing: open mobile/ios/Runner.xcworkspace in Xcode, select your team.
  # For CI: consider using a self-hosted macOS runner or Codemagic/Bitrise.
  #
  # ios:
  #   name: iOS
  #   runs-on: macos-latest
  #   ...
