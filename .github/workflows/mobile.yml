name: Mobile

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      build_debug_apk:
        description: Build and upload a debug APK artifact
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: pub-

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze

      - name: Test
        working-directory: mobile
        run: flutter test

      - name: Build APK (debug)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_debug_apk) }}
        working-directory: mobile
        run: flutter build apk --debug

      - name: Upload APK artifact
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_debug_apk) }}
        uses: actions/upload-artifact@v7
        with:
          name: godrive-debug.apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
