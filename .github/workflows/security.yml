name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  go-vulnerabilities:
    name: Go vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...

  web-audit:
    name: Web npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --prefix web

      - name: npm audit
        run: npm audit --prefix web --audit-level=moderate

  lockfile-osv:
    name: Lockfile OSV scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      upload-sarif: false
      scan-args: |-
        --lockfile=./web/package-lock.json
        --lockfile=./mobile/pubspec.lock

  docker-image:
    name: Docker image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: godrive:security
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Anchore image scan
        uses: anchore/scan-action@v7.4.0
        continue-on-error: true
        with:
          image: godrive:security
          fail-build: true
          severity-cutoff: high
