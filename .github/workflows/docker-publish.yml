name: Docker Publish

on:
  push:
    tags:
      - "v*"
  # Also push latest on every successful CI run on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_demo:
        description: Trigger homelab demo deployment after publishing the demo image
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY_IMAGE: ghcr.io/mrcodeeu/godrive
  DEMO_REGISTRY_IMAGE: ghcr.io/mrcodeeu/godrive-demo

jobs:
  build-push-demo:
    name: Build and push demo Docker image
    runs-on: ubuntu-latest
    # On workflow_run trigger, only proceed if CI actually passed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run we need the SHA that CI ran on
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve commit SHA
        id: source
        run: echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract demo metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEMO_REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push demo image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.demo
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=demo
          cache-to: type=gha,mode=max,scope=demo
          platforms: linux/amd64,linux/arm64

      - name: Trigger homelab demo deployment
        if: ${{ github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.deploy_demo) }}
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "DISPATCH_TOKEN is not configured; skipping homelab deployment trigger."
            exit 0
          fi

          curl -fsS -X POST \
            -H "Authorization: token $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/MrCodeEU/homelab-automation/dispatches \
            -d "{
              \"event_type\": \"service-update\",
              \"client_payload\": {
                \"service\": \"godrive-demo\",
                \"tag\": \"latest\",
                \"environment\": \"production\",
                \"commit_sha\": \"$SOURCE_SHA\",
                \"image\": \"${{ env.DEMO_REGISTRY_IMAGE }}:latest\"
              }
            }"

  build-push:
    name: Build and push production Docker image
    runs-on: ubuntu-latest
    needs: build-push-demo
    # On workflow_run trigger, only proceed if CI actually passed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run we need the SHA that CI ran on
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
