name: iOS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: pub-

      - name: Add Share Extension target
        run: |
          gem install xcodeproj --no-document
          ruby scripts/add_share_extension.rb

      - name: Build iOS app (unsigned)
        working-directory: mobile
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Build Share Extension (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -project Runner.xcodeproj \
            -target ShareExtension \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$GITHUB_WORKSPACE/mobile/build/ios/iphoneos" \
            build

      - name: Embed extension and package IPA
        run: |
          APP="mobile/build/ios/iphoneos/Runner.app"
          EXT="mobile/build/ios/iphoneos/ShareExtension.appex"
          PLUGINS="$APP/PlugIns"
          mkdir -p "$PLUGINS"
          if [ -d "$EXT" ]; then
            cp -r "$EXT" "$PLUGINS/"
            echo "✓ ShareExtension.appex embedded"
          else
            echo "⚠ ShareExtension.appex not found — skipping embed"
          fi
          cd mobile/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r godrive.ipa Payload/

      - uses: actions/upload-artifact@v7
        with:
          name: godrive-ios
          path: mobile/build/ios/iphoneos/godrive.ipa
          retention-days: 7
