name: iOS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: pub-

      - name: Add Share Extension target
        run: |
          gem install xcodeproj --no-document
          ruby scripts/add_share_extension.rb

      - name: Build iOS (unsigned)
        working-directory: mobile
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd mobile/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r godrive.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: godrive-ios
          path: mobile/build/ios/iphoneos/godrive.ipa
          retention-days: 7
