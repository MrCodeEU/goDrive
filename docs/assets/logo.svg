<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#e8f5fd"/>

  <!-- Folder tab (top-left, same color as body — merges visually) -->
  <rect x="6" y="15" width="23" height="12" rx="4" fill="#17a8eb"/>

  <!-- Folder body -->
  <rect x="6" y="21" width="52" height="35" rx="5" fill="#17a8eb"/>

  <!-- Folder front highlight band -->
  <rect x="6" y="28" width="52" height="28" rx="5" fill="#5bcdf5"/>

  <!--
    G letterform — center (32, 40), outer r=10.5, inner r=6
    Gap: upper-right, from −50° to 0°
    Outer start (−50°): (38.7, 32.0)
    Outer end   (  0°): (42.5, 40.0)
    Inner bottom( 90°): (32.0, 46.0)
    Inner end   (−50°): (35.9, 35.4)
  -->
  <path fill="#0a2436"
        d="M38.7 32 A10.5 10.5 0 1 0 42.5 40 L42.5 46 L32 46 A6 6 0 0 1 35.9 35.4 Z"/>
</svg>
