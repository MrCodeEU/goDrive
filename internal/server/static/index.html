<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>goDrive</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <div id="app" class="app-shell">
    <main class="auth-view" data-view="auth">
      <form class="login-panel" id="loginForm" autocomplete="on">
        <div>
          <h1>goDrive</h1>
          <p class="muted">Sign in to browse your files.</p>
        </div>
        <label>
          <span>Username</span>
          <input id="username" name="username" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary" type="submit">Sign in</button>
        <p class="error-text" id="loginError" role="alert"></p>
      </form>
    </main>

    <main class="file-view hidden" data-view="files">
      <header class="topbar">
        <div class="brand-block">
          <h1>goDrive</h1>
          <p id="userLabel" class="muted"></p>
        </div>
        <div class="topbar-actions">
          <button id="adminButton" class="hidden" type="button">Admin</button>
          <button id="trashButton" type="button">Trash</button>
          <button id="logoutButton" type="button">Sign out</button>
        </div>
      </header>

      <section class="pathbar" aria-label="Current folder">
        <button id="upButton" type="button" title="Go up">Up</button>
        <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumbs"></nav>
      </section>

      <section class="toolbar" aria-label="File actions">
        <button id="refreshButton" type="button">Refresh</button>
        <button id="newFolderButton" type="button">New folder</button>
        <label class="upload-button">
          <input id="fileInput" type="file" multiple>
          Upload
        </label>
        <div class="layout-toggle" aria-label="Layout">
          <button id="listLayoutButton" type="button">List</button>
          <button id="smallGridLayoutButton" type="button">Small grid</button>
          <button id="largeGridLayoutButton" type="button">Large grid</button>
        </div>
      </section>

      <section class="selection-toolbar hidden" id="selectionToolbar" aria-label="Selected files">
        <strong id="selectionSummary">0 selected</strong>
        <button id="bulkRenameButton" type="button">Rename</button>
        <button id="bulkDownloadButton" type="button">Download ZIP</button>
        <button id="bulkMoveButton" type="button">Move</button>
        <button id="bulkDeleteButton" class="danger" type="button">Delete</button>
        <button id="clearSelectionButton" type="button">Clear</button>
      </section>

      <section class="upload-queue hidden" id="uploadQueue" aria-live="polite">
        <div class="queue-header">
          <strong id="uploadSummary">Uploads</strong>
          <button id="clearUploadsButton" type="button">Clear done</button>
        </div>
        <div id="uploadItems" class="upload-items"></div>
      </section>

      <section class="browser" id="browser" aria-label="Files">
        <div class="table-header">
          <span><input id="selectAllCheckbox" type="checkbox" aria-label="Select all"></span>
          <span>Name</span>
          <span>Size</span>
          <span>Modified</span>
          <span></span>
        </div>
        <div id="fileRows" class="file-rows" role="list"></div>
      </section>
    </main>

    <dialog id="nameDialog" class="modal">
      <form method="dialog" id="nameForm">
        <h2 id="nameDialogTitle">Name</h2>
        <input id="nameInput" required>
        <menu>
          <button value="cancel" type="button" id="nameCancelButton">Cancel</button>
          <button value="confirm" class="primary" type="submit">Save</button>
        </menu>
      </form>
    </dialog>

    <dialog id="trashDialog" class="modal wide">
      <form method="dialog">
        <header class="modal-header">
          <h2>Trash</h2>
          <button value="cancel" type="submit">Close</button>
        </header>
        <div id="trashRows" class="trash-rows"></div>
      </form>
    </dialog>

    <dialog id="previewDialog" class="modal preview-modal">
      <header class="preview-header">
        <div>
          <h2 id="previewTitle">Preview</h2>
          <p id="previewMeta" class="muted"></p>
        </div>
        <div class="preview-actions">
          <button id="previewDownloadButton" type="button">Download</button>
          <button id="previewCloseButton" type="button">Close</button>
        </div>
      </header>
      <div id="previewBody" class="preview-body"></div>
    </dialog>

    <dialog id="adminDialog" class="modal admin-modal">
      <form method="dialog">
        <header class="modal-header">
          <div>
            <h2>Admin</h2>
            <p class="muted">Index, cache, and preview jobs</p>
          </div>
          <button value="cancel" type="submit">Close</button>
        </header>

        <section class="admin-stats" id="adminStats"></section>

        <section class="admin-actions">
          <button id="reindexButton" type="button">Full reindex</button>
          <button id="warmPreviewsButton" type="button">Generate thumbnails</button>
          <button id="refreshAdminButton" type="button">Refresh</button>
        </section>

        <section class="job-panel" id="jobPanel">
          <div class="job-row">
            <strong id="jobTitle">No active job</strong>
            <span id="jobStatus" class="muted"></span>
          </div>
          <progress id="jobProgress" max="1" value="0"></progress>
          <p id="jobMessage" class="muted"></p>
        </section>
      </form>
    </dialog>

    <div id="toast" class="toast hidden" role="status"></div>
  </div>

  <script src="/assets/app.js" defer></script>
</body>
</html>
